name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Testing the code
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Build local Docker image
        run: docker build -t events-api:test .

      - name: Run container and Test
        run: |
          docker run -d -p 5000:5000 --name test-container events-api:test
          sleep 5
          pytest -v
          docker stop test-container && docker rm test-container

  # JOB 2: Deployment (only if Job 1 is OK)
  deploy:
    name: Push to Docker Hub and Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/events-api-rob:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/events-api-rob:latest

      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Automated Smoke Test
        env:
          RENDER_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          echo "Starting smoke test against $RENDER_URL/api/health"
          success=false
          for i in {1..10}; do
            if curl --fail "${RENDER_URL}/api/health"; then
              echo "Smoke test passed! Production is live."
              success=true
              break
            else
              echo "Waiting for Render deployment (Attempt $i/10)..."
              sleep 20
            fi
          done
          
          if [ "$success" = false ]; then
            echo "Smoke test failed: Production API is not responding after deployment."
            exit 1
          fi
