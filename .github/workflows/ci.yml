name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/events-api-rob:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name events-api-container ${{ secrets.DOCKER_USERNAME }}/events-api-rob:latest

      - name: Wait and Health Check
        run: |
          echo "Waiting for API to start..."
          sleep 5
          curl --fail http://localhost:5000/api/health || exit 1

      - name: Run Pytest
        env:
          BASE_URL: http://localhost:5000
        run: |
          pytest -v

      - name: Stop and Remove container
        if: always()
        run: |
          docker stop events-api-container || true
          docker rm events-api-container || true

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/events-api-rob:latest

      - name: Trigger Render Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
