name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t events-api:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api:latest

      - name: Wait and Health Check
        run: |
          echo "Waiting for API to start..."
          sleep 5
          curl --fail http://localhost:5000/api/health || exit 1
          echo "API is healthy!"

      - name: Stop container
        if: always()
        run: docker stop events-api-container
