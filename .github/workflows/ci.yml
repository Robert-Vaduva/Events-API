name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build, Run and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Build Docker image
        run: |
          docker build -t events-api:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api:latest

      - name: Wait and Health Check
        run: |
          echo "Waiting for API to start..."
          sleep 5
          curl --fail http://localhost:5000/api/health || exit 1

      - name: Run Pytest
        env:
          BASE_URL: http://localhost:5000
        run: |
          pytest -v

      - name: Stop container
        if: always()
        run: |
          docker stop events-api-container || true
          docker rm events-api-container || true
